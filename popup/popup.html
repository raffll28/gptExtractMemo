<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatGPT to Markdown</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h1>ChatGPT to Markdown</h1>
  <p id="status" class="status">Choose a folder and export the conversation.</p>
  <div id="folder-selector" class="folder-selector">
    <input type="text" id="folder-path-input" placeholder="path" readonly>
    <button id="choose-folder-btn" type="button" title="Choose folder">...</button>
  </div>
  <button id="export-btn" type="button" class="export-btn--disabled" aria-disabled="true">Extract one</button>
  <button id="export-all-btn" type="button" class="export-btn export-btn-secondary export-btn--disabled" aria-disabled="true">Extract all</button>
  <script src="popup.js"></script>
</body>
</html>
