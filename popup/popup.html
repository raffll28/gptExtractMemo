<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatGPT to Markdown</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h1>ChatGPT to Markdown</h1>
  <p id="status" class="status">Escolha uma pasta e exporte a conversa.</p>
  <div id="folder-selector" class="folder-selector">
    <button id="choose-folder-btn" type="button">Escolher pasta</button>
    <span id="folder-label">Nenhuma pasta escolhida</span>
  </div>
  <button id="export-btn" type="button" class="export-btn--disabled" aria-disabled="true">Exportar para Markdown</button>
  <script src="popup.js"></script>
</body>
</html>
